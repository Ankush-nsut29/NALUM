{% extends "base.html" %}

{% block title %}NALUM — Login{% endblock %}

{% block content %}
<section class="section-light" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 class="text-center mb-md">Welcome Back</h2>
        
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="email" class="field-label">Email</label>
                <input type="email" id="email" name="email" placeholder="your@nsut.ac.in" required>
            </div>
            
            <div class="form-group mb-lg">
                <label for="password" class="field-label">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login &rarr;</button>
        </form>
        
        <p class="text-center mt-md text-muted">
            Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary">Sign Up</a>
        </p>
    </div>
</section>
{% endblock %}
