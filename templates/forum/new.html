{% extends "base.html" %}

{% block title %}NALUM — New Thread{% endblock %}

{% block content %}
<section class="section-light" style="min-height: 80vh; display: flex; justify-content: center; padding-top: var(--space-xl);">
    <div style="width: 100%; max-width: 800px;">
        <a href="{{ url_for('forum.list') }}" class="text-muted mb-md" style="display: inline-block;">&larr; Back to Forum</a>
        
        <div class="card">
            <h2 class="mb-md">Start a Discussion</h2>
            
            <form action="{{ url_for('forum.new') }}" method="POST">
                <div class="form-group">
                    <label for="title" class="field-label">Thread Title</label>
                    <input type="text" id="title" name="title" placeholder="What's your question or topic?" required>
                </div>
                
                <div class="form-group mb-lg">
                    <label for="body" class="field-label">Details</label>
                    <textarea id="body" name="body" placeholder="Provide more context here..." required></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">Post Thread &rarr;</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
