services:
  - type: web
    name: nalum
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: nalum-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value

databases:
  - name: nalum-db
    plan: free
    databaseName: nalum
    user: nalum
